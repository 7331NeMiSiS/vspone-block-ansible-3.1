---
####################################################################
# Create 100GB Volume and Attach to ESXi Hostgroup
####################################################################
- name: Create Volume and Attach to Hostgroup
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../ansible_vault_vars/ansible_vault_storage_var.yml

  vars:
    # Common connection info for all tasks
    connection_info:
      address: "{{ storage_address }}"
      username: "{{ vault_storage_username }}"
      password: "{{ vault_storage_secret }}"

    volume_name: "william"
    volume_size: "100GB"
    pool_id: 0
    hostgroup_name: "ESXi-195"

  tasks:
    ####################################################################
    # Task Name : Create 100GB volume 'william' in pool 0
    ####################################################################
    - name: Create 100GB volume 'william' in pool 0
      hitachivantara.vspone_block.vsp.hv_ldev:
        connection_info: "{{ connection_info }}"
        state: "present"
        spec:
          pool_id: "{{ pool_id }}"
          size: "{{ volume_size }}"
          name: "{{ volume_name }}"
      register: ldev_result

    - name: Debug volume creation result
      ansible.builtin.debug:
        var: ldev_result

    - name: Extract created LDEV ID
      set_fact:
        created_ldev_id: "{{ ldev_result.ldev.ldev_id }}"

    ####################################################################
    # Task Name : Attach volume to ESXi-195 hostgroup
    ####################################################################
    - name: Attach volume to ESXi-195 hostgroup
      hitachivantara.vspone_block.vsp.hv_hg:
        connection_info: "{{ connection_info }}"
        state: "present"
        spec:
          state: "present_ldev"
          name: "{{ hostgroup_name }}"
          ldevs: ["{{ created_ldev_id }}"]
      register: attach_result

    - name: Debug attachment result
      ansible.builtin.debug:
        var: attach_result

    ####################################################################
    # Summary
    ####################################################################
    - name: Display summary
      ansible.builtin.debug:
        msg:
          - "✓ Volume created: {{ volume_name }}"
          - "✓ Size: {{ volume_size }}"
          - "✓ Pool: {{ pool_id }}"
          - "✓ LDEV ID: {{ created_ldev_id }}"
          - "✓ Attached to: {{ hostgroup_name }}"