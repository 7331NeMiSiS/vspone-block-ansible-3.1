---
- name: GAD - Global Active Device Pair Management
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../ansible_vault_vars/gadxgad.yml

  vars:
    connection_info:
      address: "{{ storage_address }}"
      username: "{{ vault_storage_username }}"
      password: "{{ vault_storage_secret }}"
    secondary_connection_info:
      address: "{{ secondary_storage_address }}"
      username: "{{ vault_secondary_storage_username }}"
      password: "{{ vault_secondary_storage_secret }}"
    hostgroup_name: "DC1-HA810-G3-2"
    primary_vol_id: 184
    quorum_id: 30
    path_group_id: 1
    mu_number: 0
    copy_name: "PrimaryGAD"
    desired_state: "absent"
    

  tasks:
    - name: Showing Copy Group Name
      ansible.builtin.debug:
        var: "{{copy_name}}_grp_{{ primary_vol_id }}"

    - name: Create GAD pair
      hitachivantara.vspone_block.vsp.hv_gad:
        state: "{{desired_state}}"
        connection_info: "{{ connection_info }}"
        secondary_connection_info: "{{ secondary_connection_info }}"
        spec:
          copy_group_name: "{{copy_name}}_grp_{{ primary_vol_id }}"
          copy_pair_name: "{{copy_name}}_pair_{{ primary_vol_id }}"
          primary_volume_id: "{{ primary_vol_id }}"
          secondary_pool_id: 0
          path_group_id: "{{path_group_id}}"
          mu_number: "{{mu_number}}"
          secondary_hostgroups:
            - name: "{{ hostgroup_name }}"
              port: "CL3-A"
              enable_preferred_path: true
            - name: "{{ hostgroup_name }}"
              port: "CL4-A"
              enable_preferred_path: true
          primary_hostgroups:
            - name: "{{ hostgroup_name }}"
              port: "CL3-A"
              enable_preferred_path: true
            - name: "{{ hostgroup_name }}"
              port: "CL4-A"
              enable_preferred_path: true
          quorum_disk_id: "{{ quorum_id }}"
      register: result

    - name: Debug the result variable
      ansible.builtin.debug:
        var: result
